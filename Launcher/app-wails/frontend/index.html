<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PinchBot 助理</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
    }
    .header {
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    .header-link {
      color: #1890ff;
      text-decoration: none;
      cursor: pointer;
      border: none;
      background: transparent;
      padding: 0;
      font: inherit;
    }
    .header-actions { display: flex; align-items: center; gap: 10px; font-size: 12px; }
    .account-status { color: #666; }
    .live-status {
      min-height: 18px;
      padding: 6px 16px 0;
      color: #666;
      font-size: 12px;
    }
    .official-panel {
      margin: 10px 16px 0;
      padding: 12px 14px;
      background: #fff;
      border: 1px solid #e9e9e9;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .official-panel[hidden] { display: none; }
    .official-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .official-summary-main {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 220px;
    }
    .official-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }
    .official-meta {
      font-size: 12px;
      color: #666;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .official-badges {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .official-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid #d9d9d9;
      color: #666;
      background: #fafafa;
    }
    .official-badge.success {
      border-color: #b7eb8f;
      background: #f6ffed;
      color: #389e0d;
    }
    .official-badge.warning {
      border-color: #ffe58f;
      background: #fffbe6;
      color: #d48806;
    }
    .official-badge.error {
      border-color: #ffccc7;
      background: #fff2f0;
      color: #cf1322;
    }
    .official-model-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .official-model-chip {
      display: inline-flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 10px;
      border-radius: 10px;
      background: #f7faff;
      border: 1px solid #d6e4ff;
      min-width: 140px;
    }
    .official-model-chip strong {
      font-size: 13px;
      color: #1d39c4;
    }
    .official-model-chip span {
      font-size: 11px;
      color: #666;
    }
    .official-empty {
      font-size: 12px;
      color: #888;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }
    .placeholder {
      color: #999;
      text-align: center;
      padding: 24px;
      font-size: 14px;
    }
    .msg {
      margin-bottom: 12px;
      display: flex;
      align-items: flex-start;
    }
    .msg.user { justify-content: flex-end; }
    .msg.assistant { justify-content: flex-start; }
    .msg-bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: #1890ff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .msg-bubble {
      background: #e6f7ff;
      color: #333;
      border-bottom-left-radius: 4px;
    }
    .msg.assistant .msg-bubble.sending { opacity: 0.8; }
    .input-row {
      padding: 12px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
    }
    .input-row input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    .input-row button {
      padding: 10px 20px;
      background: #1890ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .input-row button:hover { background: #40a9ff; }
    .input-row .btn-add {
      padding: 10px 14px;
      background: #f0f0f0;
      color: #666;
      border: 1px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .input-row .btn-add:hover { background: #e6e6e6; color: #1890ff; }
    .composer-files {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .file-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: #e6f7ff;
      border: 1px solid #91d5ff;
      border-radius: 6px;
      font-size: 12px;
      color: #0050b3;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-chip .file-icon { font-size: 14px; flex-shrink: 0; }
    .file-chip .file-name { overflow: hidden; text-overflow: ellipsis; }
    .file-chip .file-remove {
      cursor: pointer;
      padding: 0 2px;
      color: #999;
      flex-shrink: 0;
      border: none;
      background: transparent;
      font: inherit;
    }
    .file-chip .file-remove:hover { color: #ff4d4f; }
    .file-chip .file-remove:focus-visible { outline: 2px solid #1890ff; outline-offset: 2px; border-radius: 4px; }
    .msg-bubble .bubble-files {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .msg.user .msg-bubble .file-chip {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.5);
      color: #fff;
    }
    .msg.user .msg-bubble .file-chip .file-remove { display: none; }
    .messages.drag-over { background: #e6f7ff; outline: 2px dashed #1890ff; outline-offset: -2px; }
    #reply { margin-top: 12px; padding: 12px; background: #e6f7ff; border-radius: 8px; font-size: 14px; white-space: pre-wrap; }
    .auth-panel {
      position: absolute;
      inset: 56px 0 72px 0;
      background: rgba(245,245,245,0.98);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .auth-panel.visible { display: flex; }
    .auth-card {
      width: 320px;
      padding: 20px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .auth-card h2 { margin: 0; font-size: 18px; }
    .auth-card p { margin: 0; color: #666; font-size: 13px; }
    .auth-card input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    .auth-card button {
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background: #1890ff;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    .auth-card .secondary-link {
      color: #1890ff;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
      border: none;
      background: transparent;
      padding: 0;
      font: inherit;
    }
    .auth-error {
      min-height: 18px;
      color: #ff4d4f;
      font-size: 12px;
    }
    .auth-agreement-section {
      display: none;
      border: 1px solid #f0f0f0;
      border-radius: 10px;
      padding: 10px 12px;
      background: #fafafa;
      gap: 8px;
      flex-direction: column;
    }
    .auth-agreement-section.visible { display: flex; }
    .auth-agreement-list {
      max-height: 120px;
      overflow: auto;
      font-size: 12px;
      color: #555;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .auth-agreement-item {
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }
    .auth-agreement-item:last-child {
      padding-bottom: 0;
      border-bottom: none;
    }
    .auth-agreement-item strong { display: block; color: #333; margin-bottom: 4px; }
    .auth-agreement-item a { color: #1890ff; text-decoration: none; }
    .auth-agreement-consent {
      font-size: 12px;
      color: #444;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .auth-agreement-consent input {
      width: auto;
      margin: 2px 0 0;
      flex: 0 0 auto;
    }
  </style>
</head>
<body>
  <div class="header" id="appHeader">
    <h1>PinchBot 助理</h1>
    <div class="header-actions">
      <span class="account-status" id="accountStatus">未登录</span>
      <button type="button" class="header-link" id="btnSettings">设置</button>
      <button type="button" class="header-link" id="btnSignOut" style="display:none;">退出</button>
    </div>
  </div>
  <div class="live-status" id="liveStatus" role="status" aria-live="polite"></div>
  <div class="official-panel" id="officialPanel" hidden>
    <div class="official-summary" id="officialSummary"></div>
    <div class="official-model-list" id="officialModelList"></div>
  </div>
  <div class="auth-panel" id="authPanel" role="presentation">
    <div class="auth-card" id="authDialog" role="dialog" aria-modal="true" aria-labelledby="authTitle" aria-describedby="authSubtitle" tabindex="-1">
      <h2 id="authTitle">登录</h2>
      <p id="authSubtitle">登录后才能使用聊天、官方模型和充值能力。</p>
      <label class="sr-only" for="authEmail">邮箱</label>
      <input type="email" id="authEmail" placeholder="邮箱" />
      <label class="sr-only" for="authPassword">密码</label>
      <input type="password" id="authPassword" placeholder="密码" />
      <div class="auth-agreement-section" id="authAgreementSection">
        <div class="auth-agreement-list" id="authAgreementList">正在加载注册协议…</div>
        <label class="auth-agreement-consent">
          <input type="checkbox" id="authAgreementConsent" />
          <span>我已阅读并同意当前《用户协议》《隐私政策》。</span>
        </label>
      </div>
      <div class="auth-error" id="authError" role="alert" aria-live="assertive"></div>
      <button id="btnAuthSubmit">登录</button>
      <button type="button" class="secondary-link" id="toggleAuthMode">没有账号？去注册</button>
    </div>
  </div>
  <div class="messages" id="messagesArea" role="log" aria-live="polite" aria-relevant="additions text">
    <p class="placeholder" id="placeholder">暂无对话，在下方输入或拖入文件后发送即可开始聊天。</p>
    <div id="messageList"></div>
  </div>
  <div class="input-row" id="composerRow">
    <button type="button" class="btn-add" id="btnAddFile" title="选择文件">+</button>
    <div style="flex:1; display:flex; flex-direction:column;">
      <input type="text" id="input" placeholder="有问题尽管问我~（可拖入文件，或使用粘贴快捷键上传截图）" />
      <div class="composer-files" id="composerFiles"></div>
    </div>
    <button id="send">发送</button>
  </div>

  <script>
    var STORAGE_KEY_PREFIX = 'picoclaw_launcher_chat_history';
    var currentHistoryKey = '';
    var messages = [];
    var pendingFiles = [];
    var authMode = 'login';
    var authState = { authenticated: false };
    var signupAgreements = [];
    var signupAgreementState = { loading: false, loaded: false, error: '' };
    var officialPanelState = { loading: false, access: null, models: [], error: '' };
    var officialPanelSyncState = { inFlight: null, queued: false, timerId: 0 };

    function escapeHTML(text) {
      return String(text == null ? '' : text).replace(/[&<>"']/g, function(ch) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
      });
    }
    function safeExternalURL(raw) {
      var value = String(raw == null ? '' : raw).trim();
      if (!value) return '';
      try {
        var parsed = new URL(value, window.location.href);
        if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') return '';
        return parsed.href;
      } catch (err) {
        return '';
      }
    }
    function safeExternalLinkHTML(raw, label) {
      var href = safeExternalURL(raw);
      if (!href) {
        return '<span class="official-empty">链接无效</span>';
      }
      return '<a href="' + escapeHTML(href) + '" target="_blank" rel="noreferrer noopener">' + escapeHTML(label || href) + '</a>';
    }

    function announceStatus(text) {
      var liveStatus = document.getElementById('liveStatus');
      if (liveStatus) liveStatus.textContent = text || '';
    }

    function getApp() {
      if (window.go && window.go.main && window.go.main.App) return window.go.main.App;
      if (window.go && window.go.App) return window.go.App;
      return null;
    }
    function getHistoryStorageKey(state) {
      if (!state || !state.authenticated) return '';
      var userKey = state.user_id || state.email || '';
      userKey = String(userKey || '').trim();
      if (!userKey) return '';
      return STORAGE_KEY_PREFIX + '::' + userKey;
    }
    function loadHistoryForKey(storageKey) {
      messages = [];
      currentHistoryKey = storageKey || '';
      if (!currentHistoryKey) return;
      try {
        var raw = localStorage.getItem(currentHistoryKey);
        if (raw) messages = JSON.parse(raw);
        if (!Array.isArray(messages)) messages = [];
        messages.forEach(function(m) {
          if (!m.attachments) m.attachments = [];
        });
      } catch (e) { messages = []; }
    }
    function clearHistoryForKey(storageKey) {
      if (!storageKey) return;
      try {
        localStorage.removeItem(storageKey);
      } catch (e) {}
    }
    function saveHistory() {
      if (!currentHistoryKey) return;
      try {
        localStorage.setItem(currentHistoryKey, JSON.stringify(messages));
      } catch (e) {}
    }
    function scrollToBottom() {
      var el = document.querySelector('.messages');
      if (el) el.scrollTop = el.scrollHeight;
    }
    function fileIcon(name) {
      var ext = (name || '').split('.').pop().toLowerCase();
      if (['png','jpg','jpeg','gif','webp'].indexOf(ext) >= 0) return '\uD83D\uDDBC\uFE0F';
      if (['xls','xlsx'].indexOf(ext) >= 0) return '\uD83D\uDCC4';
      if (['ppt','pptx'].indexOf(ext) >= 0) return '\uD83D\uDCC4';
      if (ext === 'pdf') return '\uD83D\uDCC4';
      if (['doc','docx'].indexOf(ext) >= 0) return '\uD83D\uDCC4';
      return '\uD83D\uDCCE';
    }
    function addPendingFiles(paths) {
      if (!paths || !paths.length) return;
      paths.forEach(function(p) {
        var name = p.split(/[/\\]/).pop() || p;
        pendingFiles.push({ path: p, name: name });
      });
      renderComposerFiles();
    }
    function addPastedImage(path, name) {
      if (!path) return;
      pendingFiles.push({ path: path, name: name || '粘贴的图片.png' });
      renderComposerFiles();
    }
    function removePendingFile(i) {
      pendingFiles.splice(i, 1);
      renderComposerFiles();
    }
    function renderComposerFiles() {
      var el = document.getElementById('composerFiles');
      el.innerHTML = '';
      pendingFiles.forEach(function(f, i) {
        var chip = document.createElement('span');
        chip.className = 'file-chip';
        var icon = document.createElement('span');
        icon.className = 'file-icon';
        icon.textContent = fileIcon(f.name);
        chip.appendChild(icon);

        var name = document.createElement('span');
        name.className = 'file-name';
        name.title = f.path || '';
        name.textContent = f.name || '';
        chip.appendChild(name);

        var remove = document.createElement('button');
        remove.type = 'button';
        remove.className = 'file-remove';
        remove.setAttribute('aria-label', '移除附件 ' + (f.name || ''));
        remove.textContent = '\u00D7';
        remove.onclick = function() { removePendingFile(i); };
        chip.appendChild(remove);
        el.appendChild(chip);
      });
    }
    function renderBubbleContent(bubble, content, attachments) {
      if (content) {
        var text = document.createElement('span');
        text.style.whiteSpace = 'pre-wrap';
        text.style.wordBreak = 'break-word';
        text.textContent = content;
        bubble.appendChild(text);
      }
      if (attachments && attachments.length) {
        var wrap = document.createElement('div');
        wrap.className = 'bubble-files';
        attachments.forEach(function(f) {
          var name = (typeof f === 'string') ? f.split(/[/\\]/).pop() : (f.name || f.path || '');
          var chip = document.createElement('span');
          chip.className = 'file-chip';
          chip.innerHTML = '<span class="file-icon">' + fileIcon(name) + '</span><span class="file-name" title="' + (typeof f === 'string' ? f : (f.path || '')).replace(/"/g, '&quot;') + '">' + (name || '').replace(/</g, '&lt;') + '</span>';
          wrap.appendChild(chip);
        });
        bubble.appendChild(wrap);
      }
    }
    function renderMessages() {
      var list = document.getElementById('messageList');
      var placeholder = document.getElementById('placeholder');
      list.innerHTML = '';
      placeholder.style.display = messages.length ? 'none' : 'block';
      messages.forEach(function(m) {
        var wrap = document.createElement('div');
        wrap.className = 'msg ' + m.role;
        var bubble = document.createElement('div');
        bubble.className = 'msg-bubble' + (m.sending ? ' sending' : '');
        renderBubbleContent(bubble, m.content, m.attachments);
        wrap.appendChild(bubble);
        list.appendChild(wrap);
      });
      scrollToBottom();
    }
    function pathsFromDrop(e) {
      var paths = [];
      var uriList = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain') || '';
      if (uriList) {
        uriList.split(/\r?\n/).forEach(function(line) {
          line = line.trim();
          if (line.indexOf('file:') === 0) {
            try {
              var rest = line.replace(/^file:\/\//, '');
              var decoded = decodeURIComponent(rest);
              if (decoded && /^\/[A-Za-z]:\//.test(decoded)) decoded = decoded.substring(1);
              if (decoded) paths.push(decoded);
            } catch (err) {}
          }
        });
      }
      if (paths.length) return paths;
      var files = e.dataTransfer.files;
      for (var i = 0; i < (files && files.length); i++) {
        var f = files[i];
        if (f.path) paths.push(f.path);
        else if (f.name && f.size !== undefined) { }
      }
      return paths;
    }
    document.getElementById('btnSettings').onclick = function() {
      var app = getApp();
      if (app && app.OpenSettings) app.OpenSettings();
    };
    document.getElementById('btnSignOut').onclick = function() {
      var app = getApp();
      if (!app || !app.SignOut) return;
      app.SignOut().then(function() {
        saveHistory();
        applyAuthState({ authenticated: false });
      }).catch(function(err) {
        alert((err && err.message) ? err.message : String(err));
      });
    };
    document.getElementById('btnAuthSubmit').onclick = submitAuth;
    document.getElementById('toggleAuthMode').onclick = function() {
      setAuthMode(authMode === 'login' ? 'signup' : 'login');
    };
    ['authEmail', 'authPassword'].forEach(function(id) {
      var input = document.getElementById(id);
      if (!input) return;
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          submitAuth();
        }
      });
    });
    document.getElementById('btnAddFile').onclick = function() {
      var app = getApp();
      if (app && app.SelectLocalFiles) {
        app.SelectLocalFiles().then(function(paths) {
          if (paths && paths.length) addPendingFiles(paths);
        }).catch(function() {});
      }
    };
    document.addEventListener('paste', function(e) {
      var items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (var i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image/') !== 0) continue;
        e.preventDefault();
        var file = items[i].getAsFile();
        if (!file) continue;
        (function(f) {
          var reader = new FileReader();
          reader.onload = function(ev) {
            var dataURL = ev.target && ev.target.result;
            if (!dataURL || typeof dataURL !== 'string') return;
            var app = getApp();
            if (app && app.SavePastedImage) {
              app.SavePastedImage(dataURL).then(function(path) {
                var ext = (f.type === 'image/png' ? 'png' : f.type === 'image/jpeg' ? 'jpg' : 'png');
                addPastedImage(path, '粘贴的图片.' + ext);
              }).catch(function() {});
            }
          };
          reader.readAsDataURL(f);
        })(file);
        return;
      }
    });
    var messagesArea = document.getElementById('messagesArea');
    messagesArea.addEventListener('dragover', function(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; messagesArea.classList.add('drag-over'); });
    messagesArea.addEventListener('dragleave', function(e) { if (!e.currentTarget.contains(e.relatedTarget)) messagesArea.classList.remove('drag-over'); });
    messagesArea.addEventListener('drop', function(e) {
      e.preventDefault();
      messagesArea.classList.remove('drag-over');
      var paths = pathsFromDrop(e);
      if (paths.length) addPendingFiles(paths);
    });
    document.getElementById('send').onclick = send;
    document.getElementById('input').onkeydown = function(e) {
      if (e.key === 'Enter') send();
    };
    function send() {
      if (!authState || !authState.authenticated) {
        renderAuthState();
        return;
      }
      var input = document.getElementById('input');
      var text = (input.value || '').trim();
      var paths = pendingFiles.map(function(f) { return f.path; });
      if (!text && !paths.length) return;
      var attachments = pendingFiles.slice();
      messages.push({ role: 'user', content: text, attachments: attachments });
      input.value = '';
      pendingFiles = [];
      renderComposerFiles();
      var app = getApp();
      if (!app || !app.Chat) {
        messages.push({ role: 'assistant', content: '桌面聊天桥接未绑定，请重新编译运行' });
        renderMessages();
        saveHistory();
        return;
      }
      messages.push({ role: 'assistant', content: '发送中…', sending: true });
      renderMessages();
      app.Chat(text, paths).then(function(r) {
        var last = messages[messages.length - 1];
        if (last && last.role === 'assistant' && last.sending) {
          last.content = r || '';
          last.sending = false;
        } else {
          messages.push({ role: 'assistant', content: r || '' });
        }
        renderMessages();
        saveHistory();
      }).catch(function(err) {
        var msg = (err && err.message) ? err.message : String(err);
        if (msg.indexOf('AUTH_REQUIRED:') === 0) {
          var last = messages[messages.length - 1];
          if (last && last.role === 'assistant' && last.sending) {
            messages.pop();
          }
          saveHistory();
          applyAuthState({ authenticated: false, error: msg.substring('AUTH_REQUIRED:'.length) });
          return;
        }
        var last = messages[messages.length - 1];
        if (last && last.role === 'assistant' && last.sending) {
          last.content = '错误: ' + msg;
          last.sending = false;
        } else {
          messages.push({ role: 'assistant', content: '错误: ' + msg });
        }
        renderMessages();
        saveHistory();
      }).finally(function() {
        refreshOfficialPanel({ showLoading: false });
      });
    }
    function setAuthMode(mode) {
      authMode = mode;
      document.getElementById('authTitle').textContent = mode === 'login' ? '登录' : '注册';
      document.getElementById('btnAuthSubmit').textContent = mode === 'login' ? '登录' : '注册';
      document.getElementById('toggleAuthMode').textContent = mode === 'login' ? '没有账号？去注册' : '已有账号？去登录';
      document.getElementById('authAgreementSection').classList.toggle('visible', mode !== 'login');
      document.getElementById('authAgreementConsent').checked = false;
      document.getElementById('authError').textContent = '';
      if (mode !== 'login') loadSignupAgreements().catch(function() {});
      announceStatus(mode === 'login' ? '请登录后继续。' : '请注册账号后继续。');
    }
    function renderSignupAgreements() {
      var list = document.getElementById('authAgreementList');
      if (!list) return;
      if (signupAgreementState.loading) {
        list.textContent = '正在加载注册协议…';
        return;
      }
      if (signupAgreementState.error) {
        list.textContent = signupAgreementState.error;
        return;
      }
      if (!signupAgreements.length) {
        list.textContent = '当前未配置注册协议，可直接注册。';
        return;
      }
      list.innerHTML = signupAgreements.map(function(doc) {
        var extra = doc.url ? ('<div>' + safeExternalLinkHTML(doc.url, '查看完整协议') + '</div>') : '';
        var content = doc.content ? ('<div>' + escapeHTML(doc.content) + '</div>') : '';
        return '<div class="auth-agreement-item"><strong>' + escapeHTML(doc.title || doc.key || '协议') + '</strong><div>版本：' + escapeHTML(doc.version || '-') + '</div>' + content + extra + '</div>';
      }).join('');
    }
    function loadSignupAgreements() {
      var app = getApp();
      if (!app || !app.ListAuthAgreements) {
        signupAgreements = [];
        signupAgreementState = {
          loading: false,
          loaded: false,
          error: '当前客户端未提供注册协议接口，请升级后重试。'
        };
        renderSignupAgreements();
        return Promise.reject(new Error(signupAgreementState.error));
      }
      signupAgreementState = { loading: true, loaded: false, error: '' };
      renderSignupAgreements();
      return app.ListAuthAgreements().then(function(docs) {
        signupAgreements = Array.isArray(docs) ? docs : [];
        signupAgreementState = { loading: false, loaded: true, error: '' };
        renderSignupAgreements();
      }).catch(function(err) {
        signupAgreements = [];
        signupAgreementState = {
          loading: false,
          loaded: false,
          error: '加载注册协议失败：' + ((err && err.message) ? err.message : String(err))
        };
        renderSignupAgreements();
        throw err;
      });
    }
    function setBackgroundInteractive(enabled) {
      ['appHeader', 'messagesArea', 'composerRow'].forEach(function(id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.inert = !enabled;
        el.setAttribute('aria-hidden', String(!enabled));
      });
    }
    function renderOfficialPanel() {
      var panel = document.getElementById('officialPanel');
      var summary = document.getElementById('officialSummary');
      var modelList = document.getElementById('officialModelList');
      if (!panel || !summary || !modelList) return;
      if (!authState || !authState.authenticated) {
        panel.hidden = true;
        summary.innerHTML = '';
        modelList.innerHTML = '';
        return;
      }
      panel.hidden = false;
      if (officialPanelState.loading) {
        summary.innerHTML = '<div class="official-summary-main"><div class="official-title">官方模型</div><div class="official-empty">正在同步官方模型状态…</div></div>';
        modelList.innerHTML = '';
        return;
      }
      if (officialPanelState.error) {
        summary.innerHTML = '<div class="official-summary-main"><div class="official-title">官方模型</div><div class="official-empty">' + escapeHTML(officialPanelState.error) + '</div></div><div class="official-badges"><span class="official-badge error">状态获取失败</span></div>';
        modelList.innerHTML = '';
        return;
      }
      var access = officialPanelState.access || {};
      var models = Array.isArray(officialPanelState.models) ? officialPanelState.models : [];
      var balanceText = typeof access.balance_fen === 'number' ? ((access.balance_fen || 0) / 100).toFixed(2) + ' 元' : ((authState.balance_fen || 0) / 100).toFixed(2) + ' 元';
      var enabled = !!access.enabled;
      summary.innerHTML =
        '<div class="official-summary-main">' +
          '<div class="official-title">官方模型</div>' +
          '<div class="official-meta">' +
            '<span>余额：' + escapeHTML(balanceText) + '</span>' +
            '<span>可售模型：' + escapeHTML(String(models.length)) + ' 个</span>' +
            '<span>状态：' + escapeHTML(enabled ? '可用' : '未配置') + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="official-badges">' +
          '<span class="official-badge ' + (enabled ? 'success' : '') + '">' + escapeHTML(enabled ? '官方模型已启用' : '官方模型未启用') + '</span>' +
          (access.low_balance ? '<span class="official-badge warning">余额偏低</span>' : '') +
        '</div>';
      if (!models.length) {
        modelList.innerHTML = '<div class="official-empty">当前还没有可售官方模型，管理员配置后会在这里展示。</div>';
        return;
      }
      modelList.innerHTML = models.map(function(model) {
        return '<div class="official-model-chip">' +
          '<strong>' + escapeHTML(model.name || model.id || '官方模型') + '</strong>' +
          '<span>模型标识：' + escapeHTML(model.id || '-') + '</span>' +
          (model.pricing_version ? '<span>计费版本：' + escapeHTML(model.pricing_version) + '</span>' : '<span>计费版本：待配置</span>') +
        '</div>';
      }).join('');
    }
    function stopOfficialPanelSync() {
      if (officialPanelSyncState.timerId) {
        clearInterval(officialPanelSyncState.timerId);
        officialPanelSyncState.timerId = 0;
      }
      officialPanelSyncState.inFlight = null;
      officialPanelSyncState.queued = false;
    }
    function ensureOfficialPanelSync() {
      if (!authState || !authState.authenticated) {
        stopOfficialPanelSync();
        return;
      }
      if (officialPanelSyncState.timerId) return;
      officialPanelSyncState.timerId = window.setInterval(function() {
        refreshOfficialPanel({ showLoading: false });
      }, 30000);
    }
    function refreshOfficialPanel(options) {
      options = options || {};
      if (!authState || !authState.authenticated) {
        stopOfficialPanelSync();
        officialPanelState = { loading: false, access: null, models: [], error: '' };
        renderOfficialPanel();
        return Promise.resolve();
      }
      var app = getApp();
      if (!app || !app.GetOfficialAccessState || !app.ListOfficialModels) {
        officialPanelState = { loading: false, access: null, models: [], error: '桌面桥接暂未暴露官方模型接口。' };
        renderOfficialPanel();
        return Promise.resolve();
      }
      ensureOfficialPanelSync();
      if (officialPanelSyncState.inFlight) {
        officialPanelSyncState.queued = true;
        return officialPanelSyncState.inFlight;
      }
      if (options.showLoading !== false) {
        officialPanelState = { loading: true, access: null, models: [], error: '' };
        renderOfficialPanel();
      }
      var loadSnapshot = app.GetOfficialPanelSnapshot
        ? app.GetOfficialPanelSnapshot().then(function(snapshot) {
            return {
              access: snapshot && snapshot.access ? snapshot.access : {},
              models: snapshot && Array.isArray(snapshot.models) ? snapshot.models : []
            };
          })
        : app.GetOfficialAccessState().then(function(access) {
            return app.ListOfficialModels().then(function(models) {
              return {
                access: access || {},
                models: Array.isArray(models) ? models : []
              };
            });
          });
      officialPanelSyncState.inFlight = loadSnapshot.then(function(snapshot) {
        officialPanelState = {
          loading: false,
          access: snapshot.access || {},
          models: Array.isArray(snapshot.models) ? snapshot.models : [],
          error: ''
        };
        renderOfficialPanel();
      }).catch(function(err) {
        var message = (err && err.message) ? err.message : String(err);
        officialPanelState = {
          loading: false,
          access: null,
          models: [],
          error: message
        };
        renderOfficialPanel();
        if (/session expired|invalid bearer token|session file is incomplete|no such file|cannot find the file/i.test(message || '')) {
          refreshAuthState();
        }
      }).finally(function() {
        officialPanelSyncState.inFlight = null;
        if (officialPanelSyncState.queued) {
          officialPanelSyncState.queued = false;
          refreshOfficialPanel({ showLoading: false });
        }
      });
      return officialPanelSyncState.inFlight;
    }
    function renderAuthState() {
      var panel = document.getElementById('authPanel');
      var dialog = document.getElementById('authDialog');
      var status = document.getElementById('accountStatus');
      var signOut = document.getElementById('btnSignOut');
      var errorEl = document.getElementById('authError');
      if (authState && authState.authenticated) {
        panel.classList.remove('visible');
        setBackgroundInteractive(true);
        var accountStatus = authState.email ? (authState.email + ' · 余额 ' + (authState.balance_fen || 0) / 100 + ' 元') : '已登录';
        if (authState.agreement_sync_pending) {
          accountStatus += ' · 协议确认待同步';
        }
        status.textContent = accountStatus;
        signOut.style.display = '';
        errorEl.textContent = '';
        announceStatus(authState.warning ? authState.warning : '登录成功，可以开始聊天了。');
      } else {
        panel.classList.add('visible');
        setBackgroundInteractive(false);
        status.textContent = '未登录';
        signOut.style.display = 'none';
        errorEl.textContent = authState && authState.error ? authState.error : '';
        announceStatus(errorEl.textContent || '当前未登录，请先登录或注册。');
        setTimeout(function() {
          if (!panel.classList.contains('visible')) return;
          var emailInput = document.getElementById('authEmail');
          if (emailInput) emailInput.focus();
          else if (dialog) dialog.focus();
        }, 0);
      }
    }
    function applyAuthState(state) {
      var previousHistoryKey = currentHistoryKey;
      var wasAuthenticated = authState && authState.authenticated;
      authState = state || { authenticated: false };
      if (wasAuthenticated && !authState.authenticated) {
        clearHistoryForKey(previousHistoryKey);
        pendingFiles = [];
        renderComposerFiles();
      }
      var nextHistoryKey = getHistoryStorageKey(authState);
      if (nextHistoryKey !== currentHistoryKey) {
        loadHistoryForKey(nextHistoryKey);
        renderMessages();
      }
      if (!nextHistoryKey && messages.length) {
        messages = [];
        renderMessages();
      }
      renderAuthState();
      if (!authState || !authState.authenticated) {
        stopOfficialPanelSync();
      }
      refreshOfficialPanel({ showLoading: true });
    }
    function refreshAuthState() {
      var app = getApp();
      if (!app || !app.GetAuthState) {
        applyAuthState({ authenticated: false });
        return;
      }
      app.GetAuthState().then(function(state) {
        applyAuthState(state || { authenticated: false });
      }).catch(function() {
        applyAuthState({ authenticated: false });
      });
    }
    function submitAuth() {
      var app = getApp();
      if (!app) return;
      var email = (document.getElementById('authEmail').value || '').trim();
      var password = (document.getElementById('authPassword').value || '').trim();
      var errorEl = document.getElementById('authError');
      errorEl.textContent = '';
      if (!email || !password) {
        errorEl.textContent = '请输入邮箱和密码';
        announceStatus(errorEl.textContent);
        return;
      }
      if (authMode !== 'login') {
        if (signupAgreementState.loading) {
          errorEl.textContent = '注册协议仍在加载，请稍后重试';
          announceStatus(errorEl.textContent);
          return;
        }
        if (signupAgreementState.error || !signupAgreementState.loaded) {
          errorEl.textContent = '注册协议加载失败，请刷新后重试';
          announceStatus(errorEl.textContent);
          return;
        }
        if (signupAgreements.length && !document.getElementById('authAgreementConsent').checked) {
          errorEl.textContent = '注册前请先阅读并同意《用户协议》《隐私政策》';
          announceStatus(errorEl.textContent);
          return;
        }
      }
      var fn = authMode === 'login' ? app.SignIn : app.SignUpWithAgreements;
      if (!fn) {
        errorEl.textContent = authMode === 'login' ? '当前客户端未提供登录接口' : '当前客户端未提供带协议校验的注册接口，请升级后重试';
        announceStatus(errorEl.textContent);
        return;
      }
      var args = authMode === 'login' ? [email, password] : [email, password, signupAgreements];
      fn.apply(app, args).then(function(state) {
        applyAuthState(state || { authenticated: false });
      }).catch(function(err) {
        errorEl.textContent = (err && err.message) ? err.message : String(err);
        announceStatus(errorEl.textContent);
      });
    }
    document.getElementById('authPanel').addEventListener('keydown', function(e) {
      var panel = document.getElementById('authPanel');
      if (!panel.classList.contains('visible') || e.key !== 'Tab') return;
      var focusable = Array.from(document.querySelectorAll('#authDialog button, #authDialog input'))
        .filter(function(el) { return !el.disabled; });
      if (!focusable.length) return;
      var first = focusable[0];
      var last = focusable[focusable.length - 1];
      if (e.shiftKey && document.activeElement === first) {
        e.preventDefault();
        last.focus();
      } else if (!e.shiftKey && document.activeElement === last) {
        e.preventDefault();
        first.focus();
      }
    });
    window.addEventListener('focus', function() {
      refreshOfficialPanel({ showLoading: false });
    });
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden) {
        refreshOfficialPanel({ showLoading: false });
      }
    });
    loadHistoryForKey('');
    renderMessages();
    setAuthMode('login');
    refreshAuthState();
  </script>
</body>
</html>
