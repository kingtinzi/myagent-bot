<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PinchBot 助理</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
    }
    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }
    .placeholder {
      color: #999;
      text-align: center;
      padding: 24px;
      font-size: 14px;
    }
    .msg {
      margin-bottom: 12px;
      display: flex;
      align-items: flex-start;
    }
    .msg.user { justify-content: flex-end; }
    .msg.assistant { justify-content: flex-start; }
    .msg-bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: #1890ff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .msg-bubble {
      background: #e6f7ff;
      color: #333;
      border-bottom-left-radius: 4px;
    }
    .msg.assistant .msg-bubble.sending { opacity: 0.8; }
    .input-row {
      padding: 12px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
    }
    .input-row input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    .input-row button {
      padding: 10px 20px;
      background: #1890ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .input-row button:hover { background: #40a9ff; }
    .input-row .btn-add {
      padding: 10px 14px;
      background: #f0f0f0;
      color: #666;
      border: 1px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .input-row .btn-add:hover { background: #e6e6e6; color: #1890ff; }
    .composer-files {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .file-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: #e6f7ff;
      border: 1px solid #91d5ff;
      border-radius: 6px;
      font-size: 12px;
      color: #0050b3;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-chip .file-icon { font-size: 14px; flex-shrink: 0; }
    .file-chip .file-name { overflow: hidden; text-overflow: ellipsis; }
    .file-chip .file-remove {
      cursor: pointer;
      padding: 0 2px;
      color: #999;
      flex-shrink: 0;
    }
    .file-chip .file-remove:hover { color: #ff4d4f; }
    .msg-bubble .bubble-files {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .msg.user .msg-bubble .file-chip {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.5);
      color: #fff;
    }
    .msg.user .msg-bubble .file-chip .file-remove { display: none; }
    .messages.drag-over { background: #e6f7ff; outline: 2px dashed #1890ff; outline-offset: -2px; }
    #reply { margin-top: 12px; padding: 12px; background: #e6f7ff; border-radius: 8px; font-size: 14px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="messages" id="messagesArea">
    <p class="placeholder" id="placeholder">暂无对话，在下方输入或拖入文件后发送即可开始聊天。</p>
    <div id="messageList"></div>
  </div>
  <div class="input-row">
    <button type="button" class="btn-add" id="btnAddFile" title="选择文件">+</button>
    <div style="flex:1; display:flex; flex-direction:column;">
      <input type="text" id="input" placeholder="有问题尽管问我~（可拖入文件，或 Ctrl+V 粘贴截图）" />
      <div class="composer-files" id="composerFiles"></div>
    </div>
    <button id="send">发送</button>
  </div>

  <script>
    var STORAGE_KEY = 'pinchbot_launcher_chat_history';
    var messages = [];
    var pendingFiles = [];

    function getApp() {
      if (window.go && window.go.main && window.go.main.App) return window.go.main.App;
      if (window.go && window.go.App) return window.go.App;
      return null;
    }
    function loadHistory() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (raw) messages = JSON.parse(raw);
        if (!Array.isArray(messages)) messages = [];
        messages.forEach(function(m) {
          if (!m.attachments) m.attachments = [];
        });
      } catch (e) { messages = []; }
    }
    function saveHistory() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
      } catch (e) {}
    }
    function scrollToBottom() {
      var el = document.querySelector('.messages');
      if (el) el.scrollTop = el.scrollHeight;
    }
    function fileIcon(name) {
      var ext = (name || '').split('.').pop().toLowerCase();
      if (['png','jpg','jpeg','gif','webp'].indexOf(ext) >= 0) return '\uD83D\uDDBC\uFE0F';
      if (['xls','xlsx'].indexOf(ext) >= 0) return '\uD83D\uDCC4';
      if (['ppt','pptx'].indexOf(ext) >= 0) return '\uD83D\uDCC4';
      if (ext === 'pdf') return '\uD83D\uDCC4';
      if (['doc','docx'].indexOf(ext) >= 0) return '\uD83D\uDCC4';
      return '\uD83D\uDCCE';
    }
    function addPendingFiles(paths) {
      if (!paths || !paths.length) return;
      paths.forEach(function(p) {
        var name = p.split(/[/\\]/).pop() || p;
        pendingFiles.push({ path: p, name: name });
      });
      renderComposerFiles();
    }
    function addPastedImage(path, name) {
      if (!path) return;
      pendingFiles.push({ path: path, name: name || '粘贴的图片.png' });
      renderComposerFiles();
    }
    function removePendingFile(i) {
      pendingFiles.splice(i, 1);
      renderComposerFiles();
    }
    function renderComposerFiles() {
      var el = document.getElementById('composerFiles');
      el.innerHTML = '';
      pendingFiles.forEach(function(f, i) {
        var chip = document.createElement('span');
        chip.className = 'file-chip';
        chip.innerHTML = '<span class="file-icon">' + fileIcon(f.name) + '</span><span class="file-name" title="' + (f.path || '').replace(/"/g, '&quot;') + '">' + (f.name || '').replace(/</g, '&lt;') + '</span><span class="file-remove" data-i="' + i + '">\u00D7</span>';
        chip.querySelector('.file-remove').onclick = function() { removePendingFile(Number(this.getAttribute('data-i'))); };
        el.appendChild(chip);
      });
    }
    function renderBubbleContent(bubble, content, attachments) {
      if (content) {
        var text = document.createElement('span');
        text.style.whiteSpace = 'pre-wrap';
        text.style.wordBreak = 'break-word';
        text.textContent = content;
        bubble.appendChild(text);
      }
      if (attachments && attachments.length) {
        var wrap = document.createElement('div');
        wrap.className = 'bubble-files';
        attachments.forEach(function(f) {
          var name = (typeof f === 'string') ? f.split(/[/\\]/).pop() : (f.name || f.path || '');
          var chip = document.createElement('span');
          chip.className = 'file-chip';
          chip.innerHTML = '<span class="file-icon">' + fileIcon(name) + '</span><span class="file-name" title="' + (typeof f === 'string' ? f : (f.path || '')).replace(/"/g, '&quot;') + '">' + (name || '').replace(/</g, '&lt;') + '</span>';
          wrap.appendChild(chip);
        });
        bubble.appendChild(wrap);
      }
    }
    function renderMessages() {
      var list = document.getElementById('messageList');
      var placeholder = document.getElementById('placeholder');
      list.innerHTML = '';
      placeholder.style.display = messages.length ? 'none' : 'block';
      messages.forEach(function(m) {
        var wrap = document.createElement('div');
        wrap.className = 'msg ' + m.role;
        var bubble = document.createElement('div');
        bubble.className = 'msg-bubble' + (m.sending ? ' sending' : '');
        renderBubbleContent(bubble, m.content, m.attachments);
        wrap.appendChild(bubble);
        list.appendChild(wrap);
      });
      scrollToBottom();
    }
    function pathsFromDrop(e) {
      var paths = [];
      var uriList = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain') || '';
      if (uriList) {
        uriList.split(/\r?\n/).forEach(function(line) {
          line = line.trim();
          if (line.indexOf('file:') === 0) {
            try {
              var rest = line.replace(/^file:\/\//, '');
              var decoded = decodeURIComponent(rest);
              if (decoded && /^\/[A-Za-z]:\//.test(decoded)) decoded = decoded.substring(1);
              if (decoded) paths.push(decoded);
            } catch (err) {}
          }
        });
      }
      if (paths.length) return paths;
      var files = e.dataTransfer.files;
      for (var i = 0; i < (files && files.length); i++) {
        var f = files[i];
        if (f.path) paths.push(f.path);
        else if (f.name && f.size !== undefined) { }
      }
      return paths;
    }
    document.getElementById('btnAddFile').onclick = function() {
      var app = getApp();
      if (app && app.SelectLocalFiles) {
        app.SelectLocalFiles().then(function(paths) {
          if (paths && paths.length) addPendingFiles(paths);
        }).catch(function() {});
      }
    };
    document.addEventListener('paste', function(e) {
      var items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (var i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image/') !== 0) continue;
        e.preventDefault();
        var file = items[i].getAsFile();
        if (!file) continue;
        (function(f) {
          var reader = new FileReader();
          reader.onload = function(ev) {
            var dataURL = ev.target && ev.target.result;
            if (!dataURL || typeof dataURL !== 'string') return;
            var app = getApp();
            if (app && app.SavePastedImage) {
              app.SavePastedImage(dataURL).then(function(path) {
                var ext = (f.type === 'image/png' ? 'png' : f.type === 'image/jpeg' ? 'jpg' : 'png');
                addPastedImage(path, '粘贴的图片.' + ext);
              }).catch(function() {});
            }
          };
          reader.readAsDataURL(f);
        })(file);
        return;
      }
    });
    var messagesArea = document.getElementById('messagesArea');
    messagesArea.addEventListener('dragover', function(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; messagesArea.classList.add('drag-over'); });
    messagesArea.addEventListener('dragleave', function(e) { if (!e.currentTarget.contains(e.relatedTarget)) messagesArea.classList.remove('drag-over'); });
    messagesArea.addEventListener('drop', function(e) {
      e.preventDefault();
      messagesArea.classList.remove('drag-over');
      var paths = pathsFromDrop(e);
      if (paths.length) addPendingFiles(paths);
    });
    document.getElementById('send').onclick = send;
    document.getElementById('input').onkeydown = function(e) {
      if (e.key === 'Enter') send();
    };
    function send() {
      var input = document.getElementById('input');
      var text = (input.value || '').trim();
      var paths = pendingFiles.map(function(f) { return f.path; });
      if (!text && !paths.length) return;
      var attachments = pendingFiles.slice();
      messages.push({ role: 'user', content: text, attachments: attachments });
      input.value = '';
      pendingFiles = [];
      renderComposerFiles();
      var app = getApp();
      if (!app || !app.Chat) {
        messages.push({ role: 'assistant', content: 'Go 未绑定，请重新编译运行' });
        renderMessages();
        saveHistory();
        return;
      }
      messages.push({ role: 'assistant', content: '发送中…', sending: true });
      renderMessages();
      app.Chat(text, paths).then(function(r) {
        var last = messages[messages.length - 1];
        if (last && last.role === 'assistant' && last.sending) {
          last.content = r || '';
          last.sending = false;
        } else {
          messages.push({ role: 'assistant', content: r || '' });
        }
        renderMessages();
        saveHistory();
      }).catch(function(err) {
        var msg = (err && err.message) ? err.message : String(err);
        var last = messages[messages.length - 1];
        if (last && last.role === 'assistant' && last.sending) {
          last.content = '错误: ' + msg;
          last.sending = false;
        } else {
          messages.push({ role: 'assistant', content: '错误: ' + msg });
        }
        renderMessages();
        saveHistory();
      });
    }
    loadHistory();
    renderMessages();
  </script>
</body>
</html>
